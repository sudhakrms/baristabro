<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Main bean gradient — medium-dark brown -->
    <linearGradient id="excelsa-body" x1="0.25" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#8D6C5D"/>
      <stop offset="45%" stop-color="#6D4C3D"/>
      <stop offset="100%" stop-color="#5A3C2E"/>
    </linearGradient>
    <!-- Highlight -->
    <radialGradient id="excelsa-highlight" cx="0.35" cy="0.28" r="0.48">
      <stop offset="0%" stop-color="#A88A7A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6D4C3D" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <radialGradient id="excelsa-shadow" cx="0.65" cy="0.73" r="0.48">
      <stop offset="0%" stop-color="#2E1A10" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6D4C3D" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="excelsa-drop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5" result="blur"/>
      <feOffset dx="1.5" dy="3.5" result="offset"/>
      <feComponentTransfer result="shadow">
        <feFuncA type="linear" slope="0.22"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#excelsa-drop)">
    <!-- Bean body — smaller teardrop shape, tapered at bottom -->
    <path
      d="M 100 50
         C 120 50, 135 62, 137 80
         C 139 100, 130 125, 115 142
         C 108 150, 95 152, 88 145
         C 72 130, 62 105, 63 82
         C 64 62, 78 50, 100 50 Z"
      fill="url(#excelsa-body)"
    />
    <path
      d="M 100 50
         C 120 50, 135 62, 137 80
         C 139 100, 130 125, 115 142
         C 108 150, 95 152, 88 145
         C 72 130, 62 105, 63 82
         C 64 62, 78 50, 100 50 Z"
      fill="url(#excelsa-highlight)"
    />
    <path
      d="M 100 50
         C 120 50, 135 62, 137 80
         C 139 100, 130 125, 115 142
         C 108 150, 95 152, 88 145
         C 72 130, 62 105, 63 82
         C 64 62, 78 50, 100 50 Z"
      fill="url(#excelsa-shadow)"
    />

    <!-- Surface texture contour lines -->
    <g opacity="0.09" stroke="#1E0E06" stroke-width="0.5" fill="none">
      <path d="M 100 58 C 115 58, 128 67, 130 82 C 132 97, 124 117, 112 132 C 107 138, 97 140, 92 135 C 79 124, 72 104, 72 86 C 73 70, 83 58, 100 58 Z"/>
      <path d="M 100 68 C 111 68, 120 74, 122 86 C 124 98, 118 112, 109 122 C 106 126, 98 127, 95 124 C 86 117, 82 104, 82 90 C 82 78, 88 68, 100 68 Z"/>
    </g>

    <!-- Center crease — slightly curved with gentle taper -->
    <path
      d="M 99 56 C 96 72, 103 88, 101 100 C 99 115, 104 132, 100 146"
      stroke="#2E1A10"
      stroke-width="2.2"
      stroke-linecap="round"
      fill="none"
      opacity="0.5"
    />
    <!-- Crease highlight -->
    <path
      d="M 98 58 C 95 74, 102 89, 100 100 C 98 114, 103 130, 99 144"
      stroke="#A88A7A"
      stroke-width="0.7"
      stroke-linecap="round"
      fill="none"
      opacity="0.3"
    />
    <!-- Crease depth -->
    <path
      d="M 100.5 57 C 97.5 73, 104.5 88, 102.5 100 C 100.5 115, 105.5 131, 101.5 145"
      stroke="#1E0E06"
      stroke-width="0.8"
      stroke-linecap="round"
      fill="none"
      opacity="0.2"
    />

    <!-- Surface grain -->
    <g opacity="0.06" stroke="#1E0E06" stroke-width="0.4" fill="none">
      <path d="M 72 72 Q 100 68, 130 75" />
      <path d="M 68 90 Q 100 86, 134 93" />
      <path d="M 67 108 Q 100 103, 132 110" />
      <path d="M 72 125 Q 100 120, 125 128" />
    </g>

    <!-- Edge rim light -->
    <path
      d="M 100 50
         C 120 50, 135 62, 137 80
         C 139 100, 130 125, 115 142
         C 108 150, 95 152, 88 145
         C 72 130, 62 105, 63 82
         C 64 62, 78 50, 100 50 Z"
      fill="none" stroke="#A88A7A" stroke-width="0.5" opacity="0.2"
    />
  </g>
</svg>
