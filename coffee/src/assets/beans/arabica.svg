<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Main bean gradient -->
    <linearGradient id="arabica-body" x1="0.3" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#A0785A"/>
      <stop offset="45%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#7A5C10"/>
    </linearGradient>
    <!-- Highlight gradient for 3D effect -->
    <radialGradient id="arabica-highlight" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#C4A265" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow gradient on bean -->
    <radialGradient id="arabica-shadow" cx="0.7" cy="0.75" r="0.5">
      <stop offset="0%" stop-color="#5A3D08" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="arabica-drop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="2" dy="4" result="offset"/>
      <feComponentTransfer result="shadow">
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#arabica-drop)">
    <!-- Bean body — elongated oval -->
    <ellipse cx="100" cy="100" rx="38" ry="56" transform="rotate(-8 100 100)" fill="url(#arabica-body)"/>
    <!-- 3D highlight -->
    <ellipse cx="100" cy="100" rx="38" ry="56" transform="rotate(-8 100 100)" fill="url(#arabica-highlight)"/>
    <!-- 3D shadow -->
    <ellipse cx="100" cy="100" rx="38" ry="56" transform="rotate(-8 100 100)" fill="url(#arabica-shadow)"/>

    <!-- Surface texture lines -->
    <g opacity="0.1" stroke="#3D2A06" stroke-width="0.5" fill="none">
      <ellipse cx="100" cy="100" rx="30" ry="48" transform="rotate(-8 100 100)"/>
      <ellipse cx="100" cy="100" rx="22" ry="40" transform="rotate(-8 100 100)"/>
      <ellipse cx="100" cy="100" rx="14" ry="30" transform="rotate(-8 100 100)"/>
    </g>

    <!-- S-curved center crease — the signature Arabica feature -->
    <path
      d="M 96 48 C 92 65, 107 82, 103 100 C 99 118, 108 135, 104 152"
      stroke="#5A3D08"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.6"
    />
    <!-- Crease highlight (left edge catch light) -->
    <path
      d="M 95 50 C 91 67, 106 83, 102 100 C 98 117, 107 133, 103 150"
      stroke="#C4A265"
      stroke-width="0.8"
      stroke-linecap="round"
      fill="none"
      opacity="0.35"
    />

    <!-- Subtle dark crease depth (right side shadow) -->
    <path
      d="M 97.5 49 C 93.5 66, 108.5 82, 104.5 100 C 100.5 118, 109.5 134, 105.5 151"
      stroke="#3D2A06"
      stroke-width="1"
      stroke-linecap="round"
      fill="none"
      opacity="0.25"
    />

    <!-- Fine surface grain lines -->
    <g opacity="0.07" stroke="#3D2A06" stroke-width="0.4" fill="none">
      <path d="M 75 70 Q 100 68, 120 75" />
      <path d="M 72 85 Q 100 82, 125 88" />
      <path d="M 70 100 Q 100 97, 128 103" />
      <path d="M 72 115 Q 100 112, 125 118" />
      <path d="M 75 130 Q 100 127, 120 133" />
    </g>

    <!-- Edge rim light -->
    <ellipse cx="100" cy="100" rx="38" ry="56" transform="rotate(-8 100 100)"
      fill="none" stroke="#C4A265" stroke-width="0.5" opacity="0.2"/>
  </g>
</svg>
