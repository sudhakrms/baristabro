<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Main bean gradient — deep brown with reddish tint -->
    <linearGradient id="liberica-body" x1="0.2" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#8B5A4A"/>
      <stop offset="45%" stop-color="#6B3A2A"/>
      <stop offset="100%" stop-color="#552818"/>
    </linearGradient>
    <!-- Highlight -->
    <radialGradient id="liberica-highlight" cx="0.32" cy="0.28" r="0.5">
      <stop offset="0%" stop-color="#B07A68" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6B3A2A" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <radialGradient id="liberica-shadow" cx="0.68" cy="0.75" r="0.5">
      <stop offset="0%" stop-color="#30150A" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6B3A2A" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="liberica-drop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4.5" result="blur"/>
      <feOffset dx="2" dy="5" result="offset"/>
      <feComponentTransfer result="shadow">
        <feFuncA type="linear" slope="0.28"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#liberica-drop)">
    <!-- Bean body — larger, asymmetric/almond shape using a custom path -->
    <path
      d="M 100 38
         C 125 38, 145 55, 148 80
         C 151 105, 140 135, 118 155
         C 108 165, 95 168, 85 160
         C 65 145, 52 115, 52 85
         C 52 60, 70 38, 100 38 Z"
      fill="url(#liberica-body)"
    />
    <path
      d="M 100 38
         C 125 38, 145 55, 148 80
         C 151 105, 140 135, 118 155
         C 108 165, 95 168, 85 160
         C 65 145, 52 115, 52 85
         C 52 60, 70 38, 100 38 Z"
      fill="url(#liberica-highlight)"
    />
    <path
      d="M 100 38
         C 125 38, 145 55, 148 80
         C 151 105, 140 135, 118 155
         C 108 165, 95 168, 85 160
         C 65 145, 52 115, 52 85
         C 52 60, 70 38, 100 38 Z"
      fill="url(#liberica-shadow)"
    />

    <!-- Surface texture contour lines -->
    <g opacity="0.08" stroke="#1E0E06" stroke-width="0.5" fill="none">
      <path d="M 100 48 C 120 48, 136 62, 139 82 C 142 102, 133 128, 115 145 C 107 153, 96 155, 88 150 C 72 138, 62 112, 62 88 C 62 68, 76 48, 100 48 Z"/>
      <path d="M 100 58 C 115 58, 127 68, 130 84 C 133 100, 126 120, 112 135 C 106 141, 97 143, 91 139 C 79 130, 72 110, 72 92 C 72 76, 82 58, 100 58 Z"/>
      <path d="M 100 70 C 110 70, 118 76, 120 88 C 122 100, 118 112, 108 122 C 104 126, 98 127, 95 125 C 87 120, 83 108, 83 96 C 83 84, 88 70, 100 70 Z"/>
    </g>

    <!-- Center crease — slightly curved, asymmetric -->
    <path
      d="M 98 46 C 95 65, 102 85, 100 105 C 98 125, 105 145, 100 160"
      stroke="#30150A"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.5"
    />
    <!-- Crease highlight -->
    <path
      d="M 97 48 C 94 67, 101 86, 99 105 C 97 124, 104 143, 99 158"
      stroke="#B07A68"
      stroke-width="0.8"
      stroke-linecap="round"
      fill="none"
      opacity="0.3"
    />
    <!-- Crease depth -->
    <path
      d="M 99.5 47 C 96.5 66, 103.5 85, 101.5 105 C 99.5 125, 106.5 144, 101.5 159"
      stroke="#1E0E06"
      stroke-width="1"
      stroke-linecap="round"
      fill="none"
      opacity="0.2"
    />

    <!-- Surface grain -->
    <g opacity="0.06" stroke="#1E0E06" stroke-width="0.4" fill="none">
      <path d="M 65 70 Q 100 66, 140 74" />
      <path d="M 60 90 Q 100 85, 145 93" />
      <path d="M 58 110 Q 100 105, 142 113" />
      <path d="M 65 130 Q 100 125, 135 133" />
      <path d="M 75 148 Q 100 143, 120 150" />
    </g>

    <!-- Edge rim light -->
    <path
      d="M 100 38
         C 125 38, 145 55, 148 80
         C 151 105, 140 135, 118 155
         C 108 165, 95 168, 85 160
         C 65 145, 52 115, 52 85
         C 52 60, 70 38, 100 38 Z"
      fill="none" stroke="#B07A68" stroke-width="0.5" opacity="0.2"
    />
  </g>
</svg>
