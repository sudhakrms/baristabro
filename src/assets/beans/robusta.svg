<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Main bean gradient — darker brown -->
    <linearGradient id="robusta-body" x1="0.2" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#7B5B4C"/>
      <stop offset="50%" stop-color="#5C3D2E"/>
      <stop offset="100%" stop-color="#4A2E20"/>
    </linearGradient>
    <!-- Highlight -->
    <radialGradient id="robusta-highlight" cx="0.35" cy="0.3" r="0.45">
      <stop offset="0%" stop-color="#9E7E6D" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5C3D2E" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <radialGradient id="robusta-shadow" cx="0.65" cy="0.72" r="0.45">
      <stop offset="0%" stop-color="#2E1A10" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5C3D2E" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="robusta-drop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="2" dy="4" result="offset"/>
      <feComponentTransfer result="shadow">
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#robusta-drop)">
    <!-- Bean body — rounder, more compact -->
    <ellipse cx="100" cy="100" rx="40" ry="44" transform="rotate(-3 100 100)" fill="url(#robusta-body)"/>
    <ellipse cx="100" cy="100" rx="40" ry="44" transform="rotate(-3 100 100)" fill="url(#robusta-highlight)"/>
    <ellipse cx="100" cy="100" rx="40" ry="44" transform="rotate(-3 100 100)" fill="url(#robusta-shadow)"/>

    <!-- Surface texture rings -->
    <g opacity="0.1" stroke="#1E0E06" stroke-width="0.5" fill="none">
      <ellipse cx="100" cy="100" rx="33" ry="37" transform="rotate(-3 100 100)"/>
      <ellipse cx="100" cy="100" rx="25" ry="29" transform="rotate(-3 100 100)"/>
      <ellipse cx="100" cy="100" rx="16" ry="20" transform="rotate(-3 100 100)"/>
    </g>

    <!-- Straight center crease — Robusta signature -->
    <path
      d="M 99 58 C 99 72, 101 88, 101 100 C 101 112, 99 128, 99 142"
      stroke="#2E1A10"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.55"
    />
    <!-- Crease highlight -->
    <path
      d="M 98 60 C 98 74, 100 88, 100 100 C 100 112, 98 126, 98 140"
      stroke="#9E7E6D"
      stroke-width="0.8"
      stroke-linecap="round"
      fill="none"
      opacity="0.3"
    />
    <!-- Crease depth shadow -->
    <path
      d="M 100.5 59 C 100.5 73, 102.5 88, 102.5 100 C 102.5 112, 100.5 127, 100.5 141"
      stroke="#1E0E06"
      stroke-width="1"
      stroke-linecap="round"
      fill="none"
      opacity="0.2"
    />

    <!-- Surface grain -->
    <g opacity="0.06" stroke="#1E0E06" stroke-width="0.4" fill="none">
      <path d="M 68 75 Q 100 72, 132 77" />
      <path d="M 65 90 Q 100 87, 135 92" />
      <path d="M 65 105 Q 100 102, 135 107" />
      <path d="M 68 120 Q 100 117, 132 122" />
    </g>

    <!-- Edge rim light -->
    <ellipse cx="100" cy="100" rx="40" ry="44" transform="rotate(-3 100 100)"
      fill="none" stroke="#9E7E6D" stroke-width="0.5" opacity="0.18"/>
  </g>
</svg>
